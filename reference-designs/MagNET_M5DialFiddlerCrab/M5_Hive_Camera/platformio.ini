[platformio]
default_envs = esp32cam
extra_configs = ../magnet-common.ini

; Each board appends a board-specific CAMERA_BOARD_* define on top of the
; magnet_base default build_flags (-DESPIDFORTH_ENABLE_TESTS=0). PlatformIO's
; ${magnet_base.build_flags} interpolation pulls in the base value.

[env:esp32cam]
; AI-Thinker ESP32-CAM (classic ESP32, 4 MB flash, 4 MB QSPI PSRAM).
; Requires external USB-TTL adapter for flashing (no onboard bridge).
extends = magnet_base
board = esp32cam
board_build.flash_mode = dio
board_build.partitions = partitions.csv
build_flags =
  ${magnet_base.build_flags}
  -DCAMERA_BOARD_AI_THINKER=1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32cam"

[env:m5cams3]
; M5Stack Unit CamS3 (ESP32-S3, 8 MB flash, 8 MB OPI PSRAM).
; Native USB for programming + console.
extends = magnet_base
board = esp32-s3-devkitc-1
board_build.flash_mode = dio
board_build.partitions = partitions.csv
build_flags =
  ${magnet_base.build_flags}
  -DCAMERA_BOARD_M5CAMS3=1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.m5cams3"

[env:m5camerax]
; M5Stack M5Camera X (classic ESP32 + OV3660, 4 MB flash, 4 MB QSPI PSRAM).
; Onboard CP2104 USB-UART bridge — no external adapter needed.
; Pin map is the Model-A (M5STACK_PSRAM) wiring; see pins_m5camerax.h.
extends = magnet_base
board = esp32dev
board_build.flash_mode = dio
board_build.partitions = partitions.csv
build_flags =
  ${magnet_base.build_flags}
  -DCAMERA_BOARD_M5CAMERAX=1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.m5camerax"
