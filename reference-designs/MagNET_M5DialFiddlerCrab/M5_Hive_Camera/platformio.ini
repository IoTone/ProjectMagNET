[platformio]
default_envs = esp32cam

[env]
framework = espidf
platform = espressif32@6.9.0
monitor_speed = 115200
board_build.flash_mode = dio
board_build.partitions = partitions.csv
build_flags =
  -DESPIDFORTH_ENABLE_TESTS=0

[env:esp32cam]
; AI-Thinker ESP32-CAM (classic ESP32, 4 MB flash, 4 MB QSPI PSRAM).
; Requires external USB-TTL adapter for flashing (no onboard bridge).
board = esp32cam
build_flags =
  ${env.build_flags}
  -DCAMERA_BOARD_AI_THINKER=1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32cam"

[env:m5cams3]
; M5Stack Unit CamS3 (ESP32-S3, 8 MB flash, 8 MB OPI PSRAM).
; Native USB for programming + console.
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -DCAMERA_BOARD_M5CAMS3=1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.m5cams3"
