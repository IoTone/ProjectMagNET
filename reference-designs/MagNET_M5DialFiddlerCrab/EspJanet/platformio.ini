[platformio]
default_envs = esp32s3
extra_configs = ../magnet-common.ini

[env:esp32s3]
extends = magnet_base
board = esp32-s3-devkitc-1
board_build.flash_mode = dio
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3"

[env:esp32c3]
extends = magnet_base
board = esp32-c3-devkitc-02
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32c3"

[env:esp32c6]
extends = magnet_base
board = esp32-c6-devkitc-1
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32c6"

[env:esp32]
extends = magnet_base
board = esp32dev
