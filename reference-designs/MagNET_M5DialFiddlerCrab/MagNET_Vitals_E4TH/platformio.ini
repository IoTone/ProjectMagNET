[platformio]
default_envs = esp32c6
extra_configs = ../magnet-common.ini

; Why `esp32-c6-devkitc-1` and not `seeed_xiao_esp32c6`:
; platform-espressif32@6.10.0 doesn't ship a XIAO C6 board ID yet. The chip,
; flash size (4 MB), bootloader, and ESP-IDF target all match Espressif's
; reference dev kit — only the pin silkscreen differs, and we override pins
; via Kconfig anyway. Swap once the XIAO ID lands upstream, or drop a custom
; board JSON under `boards/seeed_xiao_esp32c6.json` if you want the brand name.
;
; This project extends magnet_base_v54 (NOT magnet_base) because the XIAO
; ESP32-C6 isn't supported by espressif32@6.9.0 and needs IDF v5.4.

[env:esp32c6]
extends = magnet_base_v54
board = esp32-c6-devkitc-1
; The XIAO ESP32-C6 has 4 MB of flash, but the `esp32-c6-devkitc-1` board JSON
; defaults to 8 MB. Without these overrides the bootloader image header is
; stamped 8 MB, the chip detects 4 MB at runtime, the flash-init assert fails,
; and you get a boot loop.
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = partitions.csv
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
