name: FiddlerWAIch
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    watchOS: "9.0"
  developmentLanguage: ja
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  FiddlerWAIch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: "FiddlerWAIch Watch App"
        excludes:
          - "Resources/Sounds/.gitkeep"
    info:
      path: "FiddlerWAIch Watch App/Info.plist"
      properties:
        CFBundleDisplayName: Fiddlerウォッチ
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - ja
        WKApplication: true
        WKWatchOnly: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "MQTTブローカーに接続してセッション情報を受信します"
        NSBonjourServices:
          - _mqtt._tcp
          - _mqtts._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.fiddlerwaich.watchkitapp
        INFOPLIST_FILE: "FiddlerWAIch Watch App/Info.plist"
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_LANGUAGE: ja
  FiddlerWAIch Watch AppTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: "FiddlerWAIch Watch AppTests"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.fiddlerwaich.watchkitapp.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FiddlerWAIch Watch App
