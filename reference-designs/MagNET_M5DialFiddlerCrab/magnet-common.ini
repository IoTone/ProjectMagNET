; magnet-common.ini — shared base PlatformIO config for MagNET reference designs.
;
; Pulled in by each project's platformio.ini via:
;
;   [platformio]
;   extra_configs = ../magnet-common.ini
;
;   [env:<your_env>]
;   extends = magnet_base     ; or magnet_base_v54 — see below
;   board   = <chip dev kit>
;
; ────────────────────────────────────────────────────────────────────────────
; Why this file exists
; ────────────────────────────────────────────────────────────────────────────
;
; Every project's `platformio.ini` used to declare `platform`, `framework`,
; and `monitor_speed` independently. The bare PlatformIO `framework-espidf`
; symlink is shared globally across all projects on the machine, so when one
; project (or a stray `pio platform update`) bumped that symlink to a newer
; IDF version, every other project picked up the change silently. ESP-IDF
; v5.4 ships with an internally-incoherent efuse layout when overlaid on a
; v5.3 directory tree — the symptom was "Multiple ways to build the same
; target: esp_efuse_fields.c.o" failing every esp32c-anything build.
;
; The fix is `platform_packages` pinning. Each base section pins its
; framework-espidf to a specific cached versioned install. The bare
; symlink can be corrupted, upgraded, or replaced by a goat — these
; builds use their pinned versioned directory directly and don't care.
;
; Full incident write-up: docs/idf-v54-efuse-collision.md
;
; ────────────────────────────────────────────────────────────────────────────
; Sections
; ────────────────────────────────────────────────────────────────────────────

[magnet_base]
; Default fleet — ESP-IDF v5.3.1. Used by 16 of 18 MagNET projects.
; The pinned framework version resolves to ~/.platformio/packages/
; framework-espidf@3.50301.0/ which is the cached, coherent v5.3.1 install.
platform = espressif32@6.9.0
platform_packages =
  framework-espidf @ 3.50301.0
framework = espidf
monitor_speed = 115200
build_flags =
  -DESPIDFORTH_ENABLE_TESTS=0

[magnet_base_v54]
; Exception fleet — ESP-IDF v5.4. Used by MagNET_Vitals_E4TH only
; (XIAO ESP32-C6 isn't supported by espressif32@6.9.0).
;
; Intentionally NOT pinning platform_packages here — there's no clean v5.4
; versioned install cached as of 2026-05-25; relying on the bare
; framework-espidf symlink. Once that's been settled with a coherent v5.4
; tree (after the nuke-and-refetch in docs/idf-v54-efuse-collision.md),
; add the pin:
;
;   platform_packages =
;     framework-espidf @ 3.50400.0    ; or whichever PlatformIO encoding lands
platform = espressif32@6.10.0
framework = espidf
monitor_speed = 115200
build_flags =
  -DESPIDFORTH_ENABLE_TESTS=0
